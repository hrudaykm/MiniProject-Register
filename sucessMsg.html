<!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Registration Successful</title>
                <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
                    
                    /* Matches your Elite Enigma theme exactly */
                    body {
                        background: url('background.jpg') no-repeat center center fixed;
                        background-size: cover;
                        background-color: #0a0a0a;
                        color: white;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 100vh;
                        overflow: hidden;
                    }
                    
                    .overlay {
                        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                        background: rgba(0, 0, 0, 0.75);
                        z-index: 1;
                    }

                    /* The Glass Card */
                    .success-card {
                        position: relative;
                        z-index: 2;
                        background: rgba(255, 255, 255, 0.05);
                        backdrop-filter: blur(15px);
                        border: 1px solid rgba(255, 255, 255, 0.1);
                        padding: 50px 40px;
                        border-radius: 20px;
                        text-align: center;
                        max-width: 400px;
                        width: 90%;
                        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                        animation: slideUp 0.6s ease-out;
                    }

                    /* PhonePe Style Green Circle */
                    .circle-icon {
                        width: 90px;
                        height: 90px;
                        background: #10B981; /* Premium Green */
                        border-radius: 50%;
                        margin: 0 auto 25px;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        /* The pop and ripple animation */
                        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulse 2s infinite 1s;
                    }

                    /* The Checkmark */
                    .checkmark {
                        width: 25px;
                        height: 45px;
                        border: solid white;
                        border-width: 0 5px 5px 0;
                        transform: rotate(45deg);
                        margin-bottom: 10px;
                        opacity: 0;
                        animation: drawCheck 0.4s ease-out 0.5s forwards;
                    }

                    h2 { font-size: 24px; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
                    p { color: rgba(255, 255, 255, 0.7); font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
                    .event-highlight { color: #f39c12; font-weight: 600; }

                    /* The Back Button */
                    .back-btn {
                        display: inline-block;
                        padding: 12px 30px;
                        background: rgba(255, 255, 255, 0.1);
                        border: 1px solid rgba(255, 255, 255, 0.2);
                        border-radius: 30px;
                        color: white;
                        text-decoration: none;
                        font-weight: 600;
                        transition: all 0.3s ease;
                    }

                    .back-btn:hover {
                        background: rgba(255, 255, 255, 0.2);
                        transform: translateY(-2px);
                    }

                    /* Animations */
                    @keyframes slideUp {
                        0% { opacity: 0; transform: translateY(30px); }
                        100% { opacity: 1; transform: translateY(0); }
                    }
                    @keyframes popIn {
                        0% { transform: scale(0); }
                        100% { transform: scale(1); }
                    }
                    @keyframes drawCheck {
                        0% { opacity: 0; height: 0; }
                        100% { opacity: 1; height: 45px; }
                    }
                    @keyframes pulse {
                        0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
                        70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
                        100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
                    }
                </style>
            </head>
            <body>
                <div class="overlay"></div>
                <div class="success-card">
                    <div class="circle-icon">
                        <div class="checkmark"></div>
                    </div>
                    <h2>Registration Successful!</h2>
                    <p>Your details have been securely saved!!!</p>
                    
                    <a href="/" class="back-btn">Go back to front page</a>
                </div>
            </body>
            </html>
